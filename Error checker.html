<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subtitle Excel Checker</title>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <style>
    :root{
      --yellow:#fff59d;
      --border:#d0d7de;
      --bg:#f6f8fa;
      --text:#1f2328;
      --muted:#57606a;
      --danger:#cf222e;
      --ok:#1a7f37;
    }
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:#fff;
    }
    header{
      padding:16px 20px;
      border-bottom:1px solid var(--border);
      background:var(--bg);
    }
    h1{
      margin:0 0 8px;
      font-size:20px;
    }
    .wrap{
      padding:16px 20px 28px;
      max-width:1600px;
      margin:0 auto;
    }
    .panel{
      border:1px solid var(--border);
      border-radius:10px;
      padding:14px;
      background:#fff;
      margin-bottom:16px;
    }
    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:12px 16px;
      align-items:center;
    }
    .controls > div{
      display:flex;
      gap:8px;
      align-items:center;
    }
    label{
      font-size:14px;
    }
    input[type="file"], select, button{
      font-size:14px;
      padding:8px 10px;
    }
    button{
      cursor:pointer;
      border:1px solid var(--border);
      background:#fff;
      border-radius:8px;
    }
    button.primary{
      background:#0969da;
      color:#fff;
      border-color:#0969da;
    }
    button:disabled{
      opacity:.6;
      cursor:not-allowed;
    }
    .checks{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(290px, 1fr));
      gap:8px 12px;
      margin-top:12px;
    }
    .check{
      display:flex;
      align-items:flex-start;
      gap:8px;
      font-size:14px;
      line-height:1.35;
    }
    .check input{
      margin-top:3px;
    }
    .meta{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      font-size:13px;
      color:var(--muted);
      margin-top:10px;
    }
    .status{
      margin-top:10px;
      font-size:14px;
    }
    .status.ok{ color:var(--ok); }
    .status.err{ color:var(--danger); }
    .table-wrap{
      overflow:auto;
      border:1px solid var(--border);
      border-radius:10px;
      max-height:72vh;
    }
    table{
      border-collapse:collapse;
      width:100%;
      min-width:1100px;
      background:#fff;
    }
    thead th{
      position:sticky;
      top:0;
      background:#f3f4f6;
      z-index:1;
    }
    th, td{
      border:1px solid var(--border);
      padding:8px 10px;
      vertical-align:top;
      font-size:13px;
      white-space:pre-wrap;
      word-break:break-word;
    }
    th{
      text-align:left;
      font-weight:600;
    }
    .hit{
      background:var(--yellow);
    }
    .error-list{
      margin:0;
      padding-left:18px;
    }
    .small{
      color:var(--muted);
      font-size:12px;
    }
    .footer-note{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
    }
    .pill{
      display:inline-block;
      padding:2px 8px;
      border-radius:999px;
      background:#eef2ff;
      color:#3730a3;
      font-size:12px;
      margin-left:6px;
    }
  </style>
</head>
<body>
<header>
  <h1>Subtitle Excel Checker</h1>
  <div class="small">Upload an Excel file, choose frame rate, pick checks, and review highlighted errors.</div>
</header>

<div class="wrap">
  <div class="panel">
    <div class="controls">
      <div>
        <label for="fileInput"><strong>Excel file</strong></label>
        <input id="fileInput" type="file" accept=".xls,.xlsx" />
      </div>
      <div>
        <label for="fpsSelect"><strong>Frame rate</strong></label>
        <select id="fpsSelect">
          <option value="23.976">23.976</option>
          <option value="24">24</option>
          <option value="25" selected>25</option>
          <option value="29.97">29.97</option>
          <option value="30">30</option>
          <option value="50">50</option>
          <option value="59.94">59.94</option>
          <option value="60">60</option>
        </select>
      </div>
      <div>
        <button id="runBtn" class="primary" disabled>Run checks</button>
      </div>
    </div>

    <div class="checks" id="checks"></div>

    <div class="meta">
      <div>Columns used: B=start, C=end, E=dialogue, H=reading speed</div>
      <div id="fileMeta">No file loaded</div>
    </div>
    <div id="status" class="status"></div>
  </div>

  <div class="panel">
    <div id="tableContainer" class="table-wrap"></div>
    <div class="footer-note">
      Yellow highlight means the row or cell failed at least one selected rule. The error column shows rule names.
    </div>
  </div>
</div>

<script type="module">
  import { WorkerLinter, binaryInlined } from "https://unpkg.com/harper.js@0.54.0/dist/harper.js";

  const harper = new WorkerLinter({ binary: binaryInlined });
  await harper.setup();

  window.runHarperCheck = async function(text) {
    const lints = await harper.lint(text);
    return lints.map(l => ({
      type: "Grammar/spelling",
      message: l.message()
    }));
  };
</script>

<script>
const RULES = [
  { id:'gap2', label:'Minimum frame gap' },
  { id:'curlyApostrophe', label:'Curly apostrophe' },
  { id:'hyphenConsistency', label:'Missing hyphen' },
  { id:'hyphenSpace', label:'Spacing after hyphen' },
  { id:'hyphenNoSpace', label:'No spacing after hyphen' },
  { id:'limit37', label:'Character limit: 37' },
  { id:'limit42', label:'Character limit: 42' },
  { id:'multiSpace', label:'Multiple spaces' },
  { id:'emptyWhitespace', label:'Empty line' },
  { id:'edgeSpace', label:'Leading/Trailing space' },
  { id:'doubleHyphen', label:'Double hyphens' },
  { id:'maxLines2', label:'Max lines' },
  { id:'dotSeq', label:'2 or 4+ dot' },
  { id:'minDur20f', label:'Min duration: 20 frames' },
  { id:'maxDur6s', label:'Max duration: 6 sec' },
  { id:'minDur1s', label:'Min duration: 1 sec' },
  { id:'maxDur8s', label:'Max duration: 8 sec' },
  { id:'speed20', label:'Reading speed >20' },
  { id:'speed30', label:'Reading speed >30' },
  { id:'commaLast', label:'Ending comma' },
  { id:'merge2to1', label:'Fit to 1 line' },
  { id:'gemini', label:'Spelling and grammar check' }  // now using Harper, not API
];

const checksEl = document.getElementById('checks');
const fileInput = document.getElementById('fileInput');
const fpsSelect = document.getElementById('fpsSelect');
const runBtn = document.getElementById('runBtn');
const tableContainer = document.getElementById('tableContainer');
const statusEl = document.getElementById('status');
const fileMeta = document.getElementById('fileMeta');

const selected = new Set(RULES.map(r => r.id));

function buildChecks() {
  checksEl.innerHTML = '';
  RULES.forEach(rule => {
    const label = document.createElement('label');
    label.className = 'check';
    label.innerHTML = `<input type="checkbox" checked data-rule="${rule.id}"><span>${rule.label}</span>`;
    checksEl.appendChild(label);
  });
}
buildChecks();

checksEl.addEventListener('change', e => {
  if (e.target && e.target.matches('input[type="checkbox"]')) {
    if (e.target.checked) selected.add(e.target.dataset.rule);
    else selected.delete(e.target.dataset.rule);
  }
});

let workbookRows = [];
let headers = [];
let originalFileName = '';

fileInput.addEventListener('change', async () => {
  const file = fileInput.files && fileInput.files[0];
  if (!file) return;
  originalFileName = file.name;
  const ext = file.name.toLowerCase().split('.').pop();
  if (!['xls','xlsx'].includes(ext)) {
    setStatus('Please upload an .xls or .xlsx file.', true);
    return;
  }
  const ab = await file.arrayBuffer();
  const wb = XLSX.read(ab, { type:'array', cellDates:false, cellNF:false, cellText:false });
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const range = XLSX.utils.decode_range(sheet['!ref']);
  workbookRows = [];
  headers = [];

  for (let c = range.s.c; c <= range.e.c; c++) {
    const addr = XLSX.utils.encode_cell({ r: 0, c });
    const cell = sheet[addr];
    headers[c] = cell ? String(cell.v) : `Column ${c+1}`;
  }

  for (let r = 1; r <= range.e.r; r++) {
    const row = {};
    for (let c = range.s.c; c <= range.e.c; c++) {
      const addr = XLSX.utils.encode_cell({ r, c });
      row[c] = sheet[addr] ? sheet[addr].v : '';
    }
    workbookRows.push({ rowNumber: r + 1, cells: row });
  }

  fileMeta.textContent = `${file.name} loaded · ${workbookRows.length} data rows`;
  runBtn.disabled = false;
  setStatus('File loaded. Select checks and click Run checks.', false, true);
  renderTable([]);
});

runBtn.addEventListener('click', async () => {
  if (!workbookRows.length) return;
  setStatus('Running checks...', false, true);
  const fps = parseFloat(fpsSelect.value);
  const results = [];

  for (let i = 0; i < workbookRows.length; i++) {
    const rowObj = workbookRows[i];
    const nextRowObj = workbookRows[i + 1];
    const rowText = getDialogue(rowObj);
    const lineIssues = [];

    const start = parseTime(rowObj.cells[1]);
    const end = parseTime(rowObj.cells[2]);
    const speed = toNumber(rowObj.cells[7]);
    const duration = isFinite(start) && isFinite(end) ? Math.max(0, end - start) : null;

    if (selected.has('gap2') && nextRowObj) {
      const nextStart = parseTime(nextRowObj.cells[1]);
      if (isFinite(end) && isFinite(nextStart)) {
        const gapFrames = (nextStart - end) * fps;
        if (gapFrames < 2) lineIssues.push('Frame gap');
      }
    }

    if (selected.has('curlyApostrophe') && /['\u2019]/.test(rowText)) {
      if (/‘/.test(rowText)) lineIssues.push('Curly apostrophe');
    }

    if (selected.has('hyphenConsistency') && rowText.includes('\n')) {
      const lines = rowText.split(/\r?\n/);
      const starts = lines.map(l => /^\s*-\S?/.test(l));
      if (new Set(starts).size > 1) lineIssues.push('2 speaker hyphen');
    }

    if (selected.has('hyphenSpace')) {
      const lines = rowText.split(/\r?\n/);
      if (lines.some(l => /^\s*-\S/.test(l))) lineIssues.push('Space after hyphen');
    }

    if (selected.has('hyphenNoSpace') && rowText.split(/\r?\n/).some(l => /^\s*-\s+/.test(l))) {
      lineIssues.push('No space after hyphen');
    }

    if (selected.has('limit37') && rowText.split(/\r?\n/).some(l => l.trim().length > 37)) lineIssues.push('Character limit: 37');
    if (selected.has('limit42') && rowText.split(/\r?\n/).some(l => l.trim().length > 42)) lineIssues.push('Character limit: 42');

    if (selected.has('multiSpace') && / {2,}/.test(rowText)) lineIssues.push('Multiple spaces');

    if (selected.has('emptyWhitespace') && (!rowText || !String(rowText).trim())) lineIssues.push('Empty line');

    if (selected.has('edgeSpace') && rowText.split(/\r?\n/).some(l => /^\s|\s$/.test(l))) lineIssues.push('Leading/trailing space');

    if (selected.has('doubleHyphen') && /--/.test(rowText)) lineIssues.push('Double hyphens');

    if (selected.has('maxLines2') && rowText.split(/\r?\n/).length > 2) lineIssues.push('More than 2 lines');

    if (selected.has('dotSeq')) {
      const badDots = rowText.match(/\.{2,}/g) || [];
      if (badDots.some(s => s.length !== 1 && s.length !== 3)) lineIssues.push('2 or 4+ dot');
    }

    if (selected.has('minDur20f') && duration !== null && duration * fps < 20) lineIssues.push('Min duration: 20 frames');
    if (selected.has('maxDur6s') && duration !== null && duration > 6) lineIssues.push('Max duration: 6 sec');
    if (selected.has('minDur1s') && duration !== null && duration < 1) lineIssues.push('Min duration: 1 sec');
    if (selected.has('maxDur8s') && duration !== null && duration > 8) lineIssues.push('Max duration: 8 sec');

    if (selected.has('speed20') && speed !== null && speed > 20) lineIssues.push('Reading speed over 20');
    if (selected.has('speed30') && speed !== null && speed > 30) lineIssues.push('Reading speed over 30');

    if (selected.has('commaLast')) {
      const lines = rowText.split(/\r?\n/);
      const last = lines[lines.length - 1] || '';
      if (/,\\s*$/.test(last)) lineIssues.push('Ending comma');
    }

    if (selected.has('merge2to1')) {
      const lines = rowText.split(/\r?\n/);
      const startsHyphen = /^\s*-/.test(lines[0] || '');
      const maxLimit = selected.has('limit42') ? 42 : 37;
      if (lines.length === 2 && !startsHyphen) {
        const merged = lines.join(' ').replace(/\s+/g, ' ').trim();
        if (merged.length <= maxLimit) lineIssues.push('Fit to 1 line');
      }
    }

    // ✅ Rule 22: spell/grammar check using Harper (no API key)
    if (selected.has('gemini')) {
      const text = String(rowText);
      if (text && text.trim()) {
        const issues = await window.runHarperCheck(text);
        if (issues.length) {
          lineIssues.push(
            ...issues.map(i =>
              `Harper: ${i.type ? i.type + ' ' : ''}${i.message}`
            )
          );
        }
      }
    }

    results.push({
      rowNumber: rowObj.rowNumber,
      start: rowObj.cells[1],
      end: rowObj.cells[2],
      dialogue: rowObj.cells[4],
      speed: rowObj.cells[7],
      issues: [...lineIssues]
    });
  }

  if (geminiEnabled) {
    const geminiIssues = await runGeminiCheck(results.map(r => ({ rowNumber:r.rowNumber, text:String(r.dialogue ?? '') })), geminiKeyEl.value.trim());
    const byRow = new Map(geminiIssues.map(x => [x.rowNumber, x]));
    results.forEach(r => {
      if (byRow.has(r.rowNumber)) {
        const g = byRow.get(r.rowNumber);
        if (g.issues && g.issues.length) r.issues.push(...g.issues.map(i => `Gemini: ${i}`));
      }
    });
  }

  renderTable(results);
  const count = results.reduce((n, r) => n + (r.issues.length ? 1 : 0), 0);
  setStatus(`Completed. ${count} row(s) contain at least one selected error.`, false, false);
});

function getDialogue(rowObj) {
  const v = rowObj.cells[4];
  return v == null ? '' : String(v);
}

function parseTime(v) {
  if (v == null || v === '') return NaN;
  if (typeof v === 'number') return v * 86400;
  const s = String(v).trim();
  const m = s.match(/^(\d+):(\d+):(\d+)(?:[.,](\d+))?$/);
  if (m) {
    const h = +m[1], mi = +m[2], se = +m[3], ms = +(m[4] || 0);
    return h * 3600 + mi * 60 + se + ms / Math.pow(10, String(m[4] || '').length || 1);
  }
  const n = Number(s);
  return isFinite(n) ? n : NaN;
}

function toNumber(v) {
  const n = Number(v);
  return isFinite(n) ? n : null;
}

function setStatus(msg, isErr=false, isLoading=false) {
  statusEl.textContent = msg;
  statusEl.className = 'status ' + (isErr ? 'err' : 'ok');
  if (isLoading) statusEl.className = 'status';
}

function renderTable(results) {
  if (!workbookRows.length) {
    tableContainer.innerHTML = '';
    return;
  }
  const rowMap = new Map(results.map(r => [r.rowNumber, r]));
  let html = '<table><thead><tr>';
  html += '<th>Row</th>';
  headers.forEach((h, idx) => {
    html += `<th>${escapeHtml(h || `Column ${idx+1}`)}</th>`;
  });
  html += '<th>Error type</th></tr></thead><tbody>';

  workbookRows.forEach(rowObj => {
    const r = rowMap.get(rowObj.rowNumber) || { issues: [] };
    const rowHasIssues = r.issues && r.issues.length;
    html += `<tr class="${rowHasIssues ? 'hit' : ''}">`;
    html += `<td>${rowObj.rowNumber}</td>`;
    for (let c = 0; c < headers.length; c++) {
      const val = rowObj.cells[c];
      const show = val == null ? '' : String(val);
      html += `<td class="${rowHasIssues && [1,2,4,7].includes(c) ? 'hit' : ''}">${escapeHtml(show)}</td>`;
    }
    html += `<td>${rowHasIssues ? `<ul class="error-list">${r.issues.map(x => `<li>${escapeHtml(x)}</li>`).join('')}</ul>` : ''}</td>`;
    html += `</tr>`;
  });
  html += '</tbody></table>';
  tableContainer.innerHTML = html;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

async function runGeminiCheck(items, apiKey) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${encodeURIComponent(apiKey)}`;
  const prompt = {
    contents: [{
      role: "user",
      parts: [{
        text:
`Check the following subtitle dialogue lines for spelling and grammar problems.
Return JSON only with this schema:
{
  "results": [
    {
      "rowNumber": number,
      "issues": [
        {
          "type": string,
          "message": string
        }
      ]
    }
  ]
}
Only include rows that have issues.

Rows:
${JSON.stringify(items, null, 2)}`
      }]
    }],
    generationConfig: {
      responseMimeType: "application/json",
      temperature: 0.2
    }
  };

  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(prompt)
  });
  const data = await res.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
  let parsed = {};
  try { parsed = JSON.parse(text); } catch(e) { return []; }
  return (parsed.results || []).map(r => ({
    rowNumber: r.rowNumber,
    issues: (r.issues || []).map(i => `${i.type}: ${i.message}`)
  }));
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subtitle Error Checker + Harper AI</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  
  <script type="module">
    import init, { Linter } from "https://unpkg.com/harper-js@latest/harper_js.js";
    async function setupHarper() {
      try {
        await init();
        window.harperLinter = new Linter();
        console.log("Harper Engine Loaded");
      } catch (e) {
        console.error("Harper failed to load:", e);
      }
    }
    setupHarper();
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.6; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
    .page { max-width: 1300px; margin: 0 auto; padding: 2rem 1.5rem; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 0.25rem; }
    .subtitle-text { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
    .card { background: #fff; border: 0.5px solid #ddd; border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
    .card-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 1rem; }
    .row { display: flex; gap: 1.25rem; flex-wrap: wrap; align-items: flex-start; }
    .upload-area { border: 2px dashed #ccc; border-radius: 10px; padding: 2rem; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; background: #fafafa; }
    .upload-area:hover, .upload-area.drag-over { border-color: #5c5fef; background: #f0f0ff; }
    .upload-area input[type=file] { display: none; }
    .upload-icon { font-size: 32px; margin-bottom: 0.5rem; }
    .upload-label { font-size: 14px; color: #555; }
    .upload-label strong { color: #5c5fef; cursor: pointer; }
    .file-name { margin-top: 0.75rem; font-size: 13px; color: #5c5fef; font-weight: 500; }
    select, input[type=text], input[type=number] { padding: 0.45rem 0.75rem; border: 0.5px solid #ccc; border-radius: 8px; font-size: 14px; background: #fff; }
    .checks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 0.5rem; }
    .check-item { display: flex; align-items: flex-start; gap: 0.6rem; padding: 0.5rem 0.6rem; border-radius: 8px; cursor: pointer; transition: background 0.15s; user-select: none; }
    .check-item:hover { background: #f5f5f0; }
    .check-item input[type=checkbox] { margin-top: 3px; accent-color: #5c5fef; width: 15px; height: 15px; flex-shrink: 0; cursor: pointer; }
    .check-label { font-size: 13.5px; color: #333; line-height: 1.4; }
    .check-num { font-size: 11px; font-weight: 600; color: #999; min-width: 18px; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.4rem; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: opacity 0.15s, transform 0.1s; }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: #5c5fef; color: #fff; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { background: #bbb; cursor: not-allowed; }
    .btn-secondary { background: #f0f0f0; color: #444; border: 0.5px solid #ccc; }
    .btn-secondary:hover { background: #e8e8e8; }
    .controls-row { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; margin-top: 1rem; }
    .stats-row { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .stat-box { background: #f5f5f0; border-radius: 8px; padding: 0.6rem 1rem; }
    .stat-box .val { font-size: 20px; font-weight: 600; }
    .stat-box .lbl { font-size: 12px; color: #888; }
    .stat-box.err .val { color: #c0392b; }
    .stat-box.warn .val { color: #d97706; }
    .stat-box.ok .val { color: #16a34a; }
    #results-area { display: none; }
    .results-table-wrap { overflow-x: auto; border-radius: 10px; border: 0.5px solid #ddd; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { background: #f5f5f0; padding: 0.6rem 0.75rem; text-align: left; font-weight: 600; font-size: 12px; color: #666; border-bottom: 0.5px solid #ddd; white-space: nowrap; position: sticky; top: 0; z-index: 1; }
    tbody td { padding: 0.55rem 0.75rem; border-bottom: 0.5px solid #eee; vertical-align: top; }
    tbody tr.has-error { background: #fff8e1; }
    .etag { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 5px; background: #fde8e8; color: #c0392b; border: 0.5px solid #f5c6c6; margin-right: 4px; margin-bottom: 4px; }
    .dialogue-cell { white-space: pre-wrap; max-width: 360px; word-break: break-word; }
    .toggle-all { font-size: 13px; color: #5c5fef; cursor: pointer; text-decoration: underline; background: none; border: none; padding: 0; }
  </style>
</head>
<body>

<div class="page">
  <h1>Subtitle Error Checker</h1>
  <p class="subtitle-text">Client-side QA tool with Harper AI Spell & Grammar checking.</p>

  <div class="card">
    <div class="card-title">File & Settings</div>
    <div class="row">
      <div style="flex:1;min-width:220px;">
        <div class="upload-area" id="drop-zone">
          <input type="file" id="file-input" accept=".xlsx,.xls">
          <div class="upload-icon">📄</div>
          <div class="upload-label">Drop Excel here or <strong onclick="document.getElementById('file-input').click()">browse</strong></div>
          <div class="file-name" id="file-name-display"></div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:0.75rem;">
        <div>
          <label style="font-size:13px; display:block;">Frame rate</label>
          <select id="fps-select">
            <option value="23.976">23.976</option><option value="24">24</option><option value="25" selected>25</option>
          </select>
        </div>
        <div>
          <label style="font-size:13px; display:block;">Header rows to skip</label>
          <input id="skip-rows" type="number" value="1" min="0" style="width:60px;">
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">
      <div class="card-title">Checks to run</div>
      <div style="display:flex;gap:0.75rem;">
        <button class="toggle-all" onclick="toggleAll(true)">Select all</button>
        <button class="toggle-all" onclick="toggleAll(false)">Deselect all</button>
      </div>
    </div>
    <div class="checks-grid" id="checks-grid"></div> 
    <div class="controls-row">
      <button class="btn btn-primary" id="run-btn" onclick="runChecks()" disabled>Run checks</button>
      <button class="btn btn-secondary" onclick="location.reload()">Reset</button>
    </div>
  </div>

  <div id="results-area">
    <div class="card">
      <div class="stats-row" id="stats-row"></div>
      <div class="results-table-wrap">
        <table id="results-table">
          <thead>
            <tr><th>#</th><th>Row</th><th>Start</th><th>End</th><th>Dialogue</th><th>RS</th><th>Errors</th></tr>
          </thead>
          <tbody id="results-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const CHECKS = [
  { id:'spell', label:'Spell Check (AI)', defaultOn:true },
  { id:'grammar', label:'Grammar Check (AI)', defaultOn:true },
  { id:'gap2', label:'Min 2-frame gap', defaultOn:true },
  { id:'mindur20', label:'Min duration 20 frames', defaultOn:true },
  { id:'curlya', label:"Curly apostrophe", defaultOn:true },
  { id:'hypcon', label:'Hyphen for 2 speakers', defaultOn:true },
  { id:'multispc', label:'Multiple spaces', defaultOn:true },
  { id:'maxlines2', label:'Maximum 2 lines', defaultOn:true },
  { id:'comma_end', label:'End line comma', defaultOn:true }
];

function buildCheckboxes() {
  const grid = document.getElementById('checks-grid');
  grid.innerHTML = '';
  CHECKS.forEach((c, i) => {
    const div = document.createElement('label');
    div.className = 'check-item';
    div.innerHTML = `<input type="checkbox" id="chk_${c.id}" ${c.defaultOn?'checked':''}><span class="check-num">${i+1}.</span><span class="check-label">${c.label}</span>`;
    grid.appendChild(div);
  });
}

function toggleAll(on) { CHECKS.forEach(c => { document.getElementById('chk_'+c.id).checked = on; }); }
function isChecked(id) { return document.getElementById('chk_'+id).checked; }

let workbook = null;
const fi = document.getElementById('file-input');
const dz = document.getElementById('drop-zone');

fi.onchange = () => loadFile(fi.files[0]);
dz.ondragover = e => { e.preventDefault(); dz.classList.add('drag-over'); };
dz.ondrop = e => { e.preventDefault(); loadFile(e.dataTransfer.files[0]); };

function loadFile(file) {
  if(!file) return;
  document.getElementById('file-name-display').textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    workbook = XLSX.read(e.target.result, { type:'array' });
    document.getElementById('run-btn').disabled = false;
  };
  reader.readAsArrayBuffer(file);
}

function tsToFrames(val, fps) {
  if (!val) return null;
  const p = String(val).split(':');
  if (p.length < 4) return null;
  return Math.round((parseInt(p[0])*3600 + parseInt(p[1])*60 + parseInt(p[2])) * fps + parseInt(p[3]));
}

async function runChecks() {
  const fps = parseFloat(document.getElementById('fps-select').value);
  const skip = parseInt(document.getElementById('skip-rows').value)||1;
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const raw = XLSX.utils.sheet_to_json(sheet, { header:1, defval:'' });
  const rows = raw.slice(skip);

  const processed = rows.map((row, idx) => ({
    rowNum: idx+skip+1,
    startTs: row[1], endTs: row[2], dialogue: String(row[4]||''), rs: row[7],
    startF: tsToFrames(row[1], fps), endF: tsToFrames(row[2], fps), errors:[]
  })).filter(r => r.startTs || r.dialogue);

  const allErrors = new Set();

  for (let i = 0; i < processed.length; i++) {
    const r = processed[i];
    const errs = r.errors;
    const text = r.dialogue.trim();

    // Harper AI Checks
    if (window.harperLinter && text) {
      const lints = window.harperLinter.lint(text);
      lints.forEach(l => {
        const isSpelling = l.message.toLowerCase().includes("spelling") || l.message.toLowerCase().includes("typo");
        if (isSpelling && isChecked('spell')) { 
            errs.push(`Spelling: ${l.message}`); allErrors.add('Spelling'); 
        } else if (!isSpelling && isChecked('grammar')) { 
            errs.push(`Grammar: ${l.message}`); allErrors.add('Grammar'); 
        }
      });
    }

    // Manual Subtitle Checks
    if (isChecked('gap2') && i < processed.length - 1) {
      const next = processed[i+1];
      if (r.endF && next.startF && (next.startF - r.endF) < 2) {
        errs.push('Gap < 2 frames'); allErrors.add('Gap');
      }
    }
    if (isChecked('curlya') && /[\u2018\u2019]/.test(r.dialogue)) {
        errs.push("Curly apostrophe"); allErrors.add("Curly Apostrophe");
    }
  }

  renderResults(processed, allErrors);
}

function renderResults(data, allErrors) {
  const area = document.getElementById('results-area');
  area.style.display = 'block';
  const tbody = document.getElementById('results-body');
  tbody.innerHTML = '';

  data.forEach((r, idx) => {
    const tr = document.createElement('tr');
    if (r.errors.length > 0) tr.classList.add('has-error');
    tr.innerHTML = `
      <td>${idx+1}</td><td>${r.rowNum}</td>
      <td>${r.startTs}</td><td>${r.endTs}</td>
      <td class="dialogue-cell">${r.dialogue}</td><td>${r.rs}</td>
      <td>${r.errors.map(e=>`<span class="etag">${e}</span>`).join('')}</td>
    `;
    tbody.appendChild(tr);
  });
  document.getElementById('stats-row').innerHTML = `<div class="stat-box"><div class="val">${data.length}</div><div class="lbl">Rows</div></div>`;
  area.scrollIntoView({ behavior:'smooth' });
}

buildCheckboxes();
</script>
</body>
</html>
